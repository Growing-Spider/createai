[server]
# 网络配置
port = 8501
address = "0.0.0.0"
headless = true
fileWatcherType = "none"
enableCORS = true
enableXsrfProtection = false

# 上传限制 - 支持大尺寸眼底图像
maxUploadSize = 200
maxMessageSize = 200

[client]
# 显示配置
showErrorDetails = true
toolbarMode = "minimal"

[theme]
# 暗色主题匹配我们的 CSS
base = "dark"
primaryColor = "#58a6ff"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
font = "sans serif"
